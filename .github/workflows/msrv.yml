name: "MSRV"

permissions: {}

on:
  pull_request:

env:
  RUSTFLAGS: "-Dwarnings"
  CARGO_INCREMENTAL: "false"
  CARGO_PROFILE_TEST_DEBUG: "false"
  CARGO_TERM_VERBOSE: "true"
  CARGO_TERM_COLOR: "always"

jobs:
  cargo-msrv:
    name: "cargo msrv"
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # install toolchain/rustup for running `cargo msrv` itself
      # https://github.com/foresterre/cargo-msrv/blob/main/README.md#prerequisites
      - id: toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # doesn't have usual versioned releases/tags
        with:
          toolchain: "1.88.0" # current pinned stable

      - run: echo "RUSTUP_TOOLCHAIN=${RUSTUP_TOOLCHAIN}" >> "${GITHUB_ENV}"
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.toolchain.outputs.name }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 

      - id: setup-libmagic
        uses: ./.github/actions/setup-libmagic

      - uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          # renovate: taiki-e/install-action
          tool: cargo-msrv@0.19.0

      - run: cargo msrv --version
      - run: cargo msrv verify --output-format json -- cargo test --locked --all-targets --features "${FEATURES}"
        env:
          FEATURES: ${{ steps.setup-libmagic.outputs.crate-features }}
      - if: ${{ failure() }}
        run: cargo msrv find --output-format json -- cargo test --locked --all-targets --features "${FEATURES}"
        env:
          FEATURES: ${{ steps.setup-libmagic.outputs.crate-features }}
